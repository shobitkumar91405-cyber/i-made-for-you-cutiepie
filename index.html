<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>For You Cutie Pie 💖</title>

<style>
:root {
    --primary: #ff4d6d;
    --glass: rgba(255, 255, 255, 0.12);
}

body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #1a0a0d, #000);
    font-family: Arial;
    overflow: hidden;
    color: white;
}

/* hearts */
.heart-particle {
    position: absolute;
    color: var(--primary);
    pointer-events: none;
    animation: moveUp linear forwards;
}

@keyframes moveUp {
    to { transform: translateY(-110vh) rotate(360deg); }
}

/* card */
#main-card {
    background: var(--glass);
    backdrop-filter: blur(20px);
    padding: 40px 20px;
    border-radius: 30px;
    text-align: center;
}

.profile-img {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 3px solid var(--primary);
}

.magic-btn {
    background: linear-gradient(45deg, #ff4d6d, #ff758c);
    border: none;
    padding: 18px 40px;
    border-radius: 50px;
    font-size: 18px;
    color: white;
    cursor: pointer;
}

/* blackout */
#blackout {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: black;
    display: none;
    z-index: 9999;
}

#text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    color: #ff4d6d;
    font-size: 28px;
}
</style>
</head>

<body>

<div id="heart-box"></div>

<div id="main-card">
    <img src="photo1.jpg" class="profile-img">
    <h1>Hii Cutie Pie! 💖</h1>
    <p>I made something special for you... tap below!</p>
    <button class="magic-btn" onclick="startTheMagic()">Click Me ✨</button>
</div>

<div id="blackout">
    <div id="text">💕 Tere Liye 💕</div>
</div>

<!-- 🔥 UPDATED AUDIO (newsong.mp3) -->
<audio id="a1" src="newsong.mp3" loop playsinline></audio>
<audio id="a2" src="newsong.mp3" loop playsinline></audio>
<audio id="a3" src="newsong.mp3" loop playsinline></audio>

<script>

// hearts
function createHeart() {
    const box = document.getElementById('heart-box');
    const h = document.createElement('div');
    h.className = 'heart-particle';
    h.innerHTML = '❤️';
    h.style.left = Math.random()*100+'vw';
    h.style.top = '100vh';
    h.style.animationDuration = (Math.random()*3+3)+'s';
    box.appendChild(h);
    setTimeout(()=>h.remove(),5000);
}
setInterval(createHeart,400);

// audio list
let audios = [
document.getElementById("a1"),
document.getElementById("a2"),
document.getElementById("a3")
];

function startTheMagic(){

    // fullscreen
    document.documentElement.requestFullscreen?.();

    // 🔊 audio play fix
    audios.forEach(a=>{
        a.load();
        a.volume = 1;
        a.play().catch(()=>{});
    });

    // 🔁 volume illusion (safe)
    setInterval(()=>{
        audios.forEach(a=> a.volume = 1);
    },100);

    // 📳 vibration
    if(navigator.vibrate){
        setInterval(()=>{
            navigator.vibrate([500,200,500]);
        },1200);
    }

    // UI change
    document.getElementById("main-card").style.display="none";
    document.getElementById("blackout").style.display="block";

    // back block feel
    history.pushState(null,null,location.href);
    window.onpopstate=function(){
        history.go(1);
    };
}

</script>

</body>
</html>
