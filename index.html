<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Lori for Suruchi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      overflow: hidden;
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
      color: #fff;
      position: relative;
      text-align: center;
    }

    /* Rain animation */
    .rain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .drop {
      position: absolute;
      width: 2px;
      height: 60px;
      background: rgba(255, 255, 255, 0.35);
      animation: fall linear infinite;
    }

    @keyframes fall {
      to {
        transform: translateY(120vh);
      }
    }

    .page {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 2;
    }

    .page.active {
      opacity: 1;
      pointer-events: auto;
    }

    h1 {
      font-size: 1.9rem;
      line-height: 1.35;
      margin-bottom: 35px;
      text-shadow: 0 2px 6px rgba(0,0,0,0.25);
    }

    .btn {
      background: rgba(255, 255, 255, 0.22);
      border: 2px solid rgba(255,255,255,0.6);
      color: white;
      padding: 14px 36px;
      font-size: 1.15rem;
      border-radius: 999px;
      cursor: pointer;
      backdrop-filter: blur(12px);
      transition: all 0.3s ease;
    }

    .btn:active {
      transform: scale(0.96);
      background: rgba(255, 255, 255, 0.35);
    }

    /* Heart cards */
    .videos-container {
      display: flex;
      justify-content: center;
      gap: 40px;
      width: 100%;
      max-width: 420px;
      flex-wrap: wrap;
    }

    .heart-card {
      width: 150px;
      height: 150px;
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .heart-card:hover {
      transform: scale(1.08);
    }

    .heart-card video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      display: none;
    }

    .heart-shape {
      position: absolute;
      inset: 0;
      background: rgba(255, 182, 193, 0.4);
      clip-path: polygon(50% 0%, 100% 30%, 90% 90%, 50% 100%, 10% 90%, 0% 30%);
      backdrop-filter: blur(4px);
      z-index: -1;
    }

    .label {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>

  <div class="rain" id="rain"></div>

  <div id="intro" class="page active">
    <h1>hi suruchi 😊<br>aapko neend nahi aa rahi,<br>koi na... aap lori suno 🥰</h1>
    <button class="btn" onclick="goToVideos()">next</button>
  </div>

  <div id="videosPage" class="page">
    <h1>tap on a heart to listen lori</h1>
    <div class="videos-container">
      <div class="heart-card" onclick="playThis(1)">
        <div class="heart-shape"></div>
        <video id="v1" src="video1.mp4" preload="none" loop playsinline></video>
        <div class="label">lori 1</div>
      </div>

      <div class="heart-card" onclick="playThis(2)">
        <div class="heart-shape"></div>
        <video id="v2" src="video2.mp4" preload="none" loop playsinline></video>
        <div class="label">lori 2</div>
      </div>
    </div>
  </div>

  <script>
    const introPage = document.getElementById('intro');
    const videosPage = document.getElementById('videosPage');
    let activeVideo = null;

    function goToVideos() {
      introPage.classList.remove('active');
      videosPage.classList.add('active');
      startRain();
    }

    function playThis(num) {
      // Pause previous video if any
      if (activeVideo && activeVideo !== num) {
        const prevVid = document.getElementById('v' + activeVideo);
        prevVid.pause();
        prevVid.currentTime = 0;
        prevVid.style.display = 'none';
      }

      const thisVid = document.getElementById('v' + num);
      
      if (thisVid.style.display === 'block' && !thisVid.paused) {
        // If already playing → pause it
        thisVid.pause();
        thisVid.style.display = 'none';
        activeVideo = null;
      } else {
        // Play this one
        thisVid.style.display = 'block';
        thisVid.play().catch(e => console.log("Play prevented:", e));
        activeVideo = num;
      }
    }

    function startRain() {
      const rainContainer = document.getElementById('rain');
      for (let i = 0; i < 120; i++) {
        const drop = document.createElement('div');
        drop.className = 'drop';
        drop.style.left = Math.random() * 100 + '%';
        drop.style.animationDuration = (0.4 + Math.random() * 0.7) + 's';
        drop.style.animationDelay = Math.random() * 3 + 's';
        drop.style.opacity = Math.random() * 0.4 + 0.2;
        rainContainer.appendChild(drop);
      }
    }
  </script>
</body>
</html>
